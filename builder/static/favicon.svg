<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="ポイ活ニュースのファビコン（P）">
  <!-- オレンジの角丸タイル（ブランドカラー） -->
  <rect x="4" y="4" width="56" height="56" rx="13" fill="#e8590c"/>
  <!-- 白い太字の P：縦棒（ステム）＋上部のボウル -->
  <rect x="20" y="15" width="9" height="34" rx="1.5" fill="#ffffff"/>
  <!-- ボウル（上部の輪）: ステム右側から膨らむD字 -->
  <path d="M25 15h8c7 0 11 4.5 11 10s-4 10-11 10h-8z" fill="#ffffff"/>
  <!-- カウンター（輪の内側の穴）: 背景と同色でくり抜く -->
  <path d="M29 22h4c3 0 4.5 1.3 4.5 3s-1.5 3-4.5 3h-4z" fill="#e8590c"/>
</svg>
